<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Someone Special 💖</title>

<style>
    body {
        background: linear-gradient(to right, pink, #ff4d6d);
        text-align: center;
        font-family: Arial;
        color: white;
        overflow: hidden;
    }

    h1 {
        margin-top: 80px;
        font-size: 28px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: white;
        color: #ff4d6d;
        cursor: pointer;
    }

    .heart {
        position: absolute;
        color: red;
        animation: float 4s linear infinite;
    }

    @keyframes float {
        0% {transform: translateY(0);}
        100% {transform: translateY(-800px);}
    }
</style>
</head>

<body>

<h1>Click karo 👇</h1>

<button onclick="showLove()">Click Me ❤️</button>

<h2 id="msg"></h2>

<script>
function showLove(){
    document.getElementById("msg").innerHTML = 
    "Tu meri life ka sabse special part hai ❤️ <br><br> I REALLY LIKE YOU 😍";
}

function createHeart(){
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
